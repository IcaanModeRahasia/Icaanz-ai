<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ICAN · Misteri Abjad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .puzzle-card {
            max-width: 800px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .hero {
            padding: 1.8rem 2rem 1.2rem 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .title {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-weight: 700;
        }

        .title .ican {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #E0E7FF, #A5B4FC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .title .ai-badge {
            font-size: 1rem;
            background: rgba(165, 180, 252, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #c7d2fe;
            font-weight: 500;
            border: 0.5px solid rgba(165, 180, 252, 0.4);
        }

        .sub {
            margin-top: 0.5rem;
            color: #94a3b8;
            font-size: 0.8rem;
            display: flex;
            justify-content: flex-end;
        }

        .chat-area {
            padding: 1.5rem 1.8rem;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease-out;
        }

        .user-msg {
            align-self: flex-end;
        }

        .ai-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 1.8rem;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
            transition: transform 0.1s ease;
        }

        .user-msg .bubble {
            background: linear-gradient(115deg, #4f46e5, #6366f1);
            color: white;
            border-bottom-right-radius: 0.25rem;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .ai-msg .bubble {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 0.25rem;
            backdrop-filter: blur(4px);
        }

        .sound-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #facc15;
            border: 1px solid #facc1540;
        }

        .timestamp {
            font-size: 0.65rem;
            margin-top: 0.3rem;
            margin-left: 0.8rem;
            color: #5b6e8c;
            letter-spacing: 0.3px;
        }

        .input-panel {
            padding: 1rem 1.8rem 1.8rem 1.8rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            background: #0f172a;
            border-radius: 3rem;
            padding: 0.25rem 0.25rem 0.25rem 1.2rem;
            border: 1px solid #334155;
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 0;
            font-size: 0.95rem;
            color: #f1f5f9;
            outline: none;
            font-family: inherit;
        }

        #messageInput::placeholder {
            color: #475569;
            font-weight: 400;
        }

        button {
            background: #4f46e5;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: #6366f1;
            transform: scale(0.96);
        }

        button:active {
            transform: scale(0.94);
        }

        .hint-footer {
            padding: 0.8rem 1.8rem 1.2rem;
            font-size: 0.75rem;
            color: #6c7a91;
            background: rgba(0, 0, 0, 0.2);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            letter-spacing: 0.3px;
        }

        .hint-footer span {
            color: #facc15;
            font-weight: 500;
            background: #00000030;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes soundWave {
            0% { opacity: 0.5; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.1);}
        }

        .playing {
            animation: soundWave 0.3s ease-in-out 2;
        }

        @media (max-width: 550px) {
            .puzzle-card {
                border-radius: 1.8rem;
            }
            .chat-area {
                padding: 1.2rem;
                max-height: 420px;
            }
            .hero {
                padding: 1.2rem 1.2rem 0.8rem;
            }
            .title .ican {
                font-size: 1.8rem;
            }
            .message {
                max-width: 90%;
            }
            .input-panel {
                padding: 0.8rem 1.2rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="puzzle-card">
    <div class="hero">
        <div class="title">
            <span class="ican">ICAN</span>
            <span class="ai-badge">✦ 謎語AI ✦</span>
        </div>
        <div class="sub"></div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message ai-msg">
            <div class="bubble welcome-bubble">
                Halo, semoga beruntung🍀
            </div>
            <div class="timestamp">now</div>
        </div>
    </div>

    <div class="input-panel">
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Ketik pesan rahasia atau tebakan..." autocomplete="off">
            <button id="sendBtn">Kirim ➤</button>
        </div>
    </div>
    <div class="hint-footer">
        🔍 <span>petunjuk : abjad, nuestro sitio web</span>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chatArea');
    const inputField = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendBtn');

    // --- Morse Code untuk "I LOVE YOU" (dalam bentuk simbol)
    // Dot (.) = pendek, Dash (-) = panjang
    const morseSequence = [
        { char: 'I', pattern: '..' },
        { char: 'L', pattern: '.-..' },
        { char: 'O', pattern: '---' },
        { char: 'V', pattern: '...-' },
        { char: 'E', pattern: '.' },
        { char: 'Y', pattern: '-.--' },
        { char: 'O', pattern: '---' },
        { char: 'U', pattern: '..-' }
    ];

    // Audio context & utility
    let audioCtx = null;
    let isPlaying = false;
    let currentTimeout = null;

    // Inisialisasi audio context setelah user gesture (pertama kali ada interaksi)
    function initAudioContext() {
        if (audioCtx) return audioCtx;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    // Memainkan nada dengan durasi tertentu (ms)
    function playTone(durationMs, frequency = 800, onEnd) {
        if (!audioCtx) {
            initAudioContext();
        }
        // Resume jika suspended
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                actuallyPlayTone(durationMs, frequency, onEnd);
            }).catch(() => {});
        } else {
            actuallyPlayTone(durationMs, frequency, onEnd);
        }
    }

    function actuallyPlayTone(durationMs, frequency, onEnd) {
        const now = audioCtx.currentTime;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = frequency;
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + durationMs / 1000);
        oscillator.start();
        oscillator.stop(now + durationMs / 1000);
        if (onEnd) {
            setTimeout(onEnd, durationMs);
        }
    }

    // Memainkan kode morse dari pattern (string dengan . dan -)
    function playMorsePattern(pattern, onComplete) {
        let index = 0;
        const dotDuration = 120;   // milidetik
        const dashDuration = 360;  // 3x dot
        const symbolGap = 40;      // jeda antar sinyal dalam huruf
        const letterGap = 300;      // jeda antar huruf (lebih panjang)

        function playNextSymbol() {
            if (index >= pattern.length) {
                if (onComplete) onComplete();
                return;
            }
            const symbol = pattern[index];
            let duration = (symbol === '.') ? dotDuration : dashDuration;
            playTone(duration, 780, () => {
                index++;
                // jeda antar simbol (kecuali setelah simbol terakhir)
                if (index < pattern.length) {
                    setTimeout(playNextSymbol, symbolGap);
                } else {
                    // selesai satu huruf, ada jeda lebih panjang sebelum huruf berikutnya
                    if (onComplete) onComplete();
                }
            });
        }
        playNextSymbol();
    }

    // Memainkan seluruh kalimat morse dengan jeda antar huruf
    function playFullMorse(sequences, onFinished) {
        let seqIndex = 0;
        function playNextLetter() {
            if (seqIndex >= sequences.length) {
                if (onFinished) onFinished();
                return;
            }
            const letter = sequences[seqIndex];
            playMorsePattern(letter.pattern, () => {
                seqIndex++;
                // jeda antar huruf (kecuali setelah huruf terakhir)
                if (seqIndex < sequences.length) {
                    setTimeout(playNextLetter, 300);
                } else {
                    if (onFinished) onFinished();
                }
            });
        }
        playNextLetter();
    }

    // Fungsi untuk memutar suara morse rahasia (I LOVE YOU)
    function playSecretMorseAudio() {
        if (isPlaying) {
            // hentikan pemutaran sebelumnya jika ada
            if (currentTimeout) clearTimeout(currentTimeout);
            if (audioCtx) {
                // tidak ada cara langsung stop oscillator, kita hanya abaikan dan buat baru
            }
            isPlaying = false;
        }
        isPlaying = true;
        // pastikan audio context aktif (resume)
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                playFullMorse(morseSequence, () => {
                    isPlaying = false;
                });
            }).catch(() => {
                isPlaying = false;
            });
        } else if (!audioCtx) {
            initAudioContext();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    playFullMorse(morseSequence, () => { isPlaying = false; });
                }).catch(() => { isPlaying = false; });
            } else {
                playFullMorse(morseSequence, () => { isPlaying = false; });
            }
        } else {
            playFullMorse(morseSequence, () => { isPlaying = false; });
        }
    }

    // --- Chat UI functions ---
    function addMessage(sender, text, isSoundMessage = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        
        if (sender === 'ai' && isSoundMessage) {
            // Tampilkan indikator suara tanpa menyebut morse
            const soundIcon = document.createElement('div');
            soundIcon.className = 'sound-indicator';
            soundIcon.innerHTML = '🔊 <span style="font-size:0.8rem;">pesan suara</span>';
            bubbleDiv.appendChild(soundIcon);
            // Tambahkan efek animasi untuk menandakan suara diputar (opsional)
            setTimeout(() => {
                const indicator = bubbleDiv.querySelector('.sound-indicator');
                if (indicator) indicator.classList.add('playing');
                setTimeout(() => {
                    if (indicator) indicator.classList.remove('playing');
                }, 500);
            }, 50);
        } else {
            bubbleDiv.textContent = text;
        }
        
        messageDiv.appendChild(bubbleDiv);
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        timeSpan.textContent = timeStr;
        messageDiv.appendChild(timeSpan);
        
        chatContainer.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    // Proses pesan user
    function processUserMessage(rawMessage) {
        let message = rawMessage.trim();
        if (message === "") {
            addMessage('ai', '📭 Kirim pesan teks ya ... (kosong tidak direspon)');
            return;
        }
        
        addMessage('user', message);
        
        // Kode rahasia: 93114
        if (message === "93114") {
            // Tampilkan indikator pesan suara (tanpa teks morse)
            addMessage('ai', '', true);
            // Putar suara morse (tanpa memberitahu itu morse)
            playSecretMorseAudio();
        } 
        else {
            addMessage('ai', 'web ini mungkin masi eror');
        }
    }
    
    function handleSend() {
        const userText = inputField.value;
        if (userText.trim() === "") {
            inputField.placeholder = "Ketik sesuatu dulu...";
            setTimeout(() => {
                inputField.placeholder = "Ketik pesan rahasia atau tebakan...";
            }, 1200);
            return;
        }
        processUserMessage(userText);
        inputField.value = "";
        inputField.focus();
    }
    
    function onEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    }
    
    window.addEventListener('load', () => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
        inputField.focus();
    });
    
    sendButton.addEventListener('click', handleSend);
    inputField.addEventListener('keypress', onEnterKey);
    
    // Pastikan audio context dapat diinisialisasi pada user gesture pertama (kirim pesan)
    // Tapi kita tidak perlu panggil init dulu, nanti saat playSecretMorseAudio akan otomatis.
    // Namun agar lebih mulus, ketika pengguna mengirim pesan apa pun, kita bisa "siapkan" audio context tanpa suara.
    // Tapi tidak wajib, karena play akan memicu resume.
    // Untuk mencegah error karena autoplay policy, kita bisa menambahkan inisialisasi diam saat klik pertama pada halaman.
    document.body.addEventListener('click', function initAudioOnFirstClick() {
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().catch(e => console.log);
        } else if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.suspend(); // jangan langsung bunyi, hanya buat context
        }
        document.body.removeEventListener('click', initAudioOnFirstClick);
    }, { once: true });
    
    // Title & style tambahan
    document.title = "ICAN | Misteri Abjad";
    
    function manageChatOverflow() {
        const messages = chatContainer.querySelectorAll('.message');
        if (messages.length > 45) {
            for (let i = 0; i < 15; i++) {
                if (messages[i]) messages[i].remove();
            }
        }
    }
    
    const originalAddMessage = addMessage;
    window.addMessage = function(sender, text, isSound) {
        originalAddMessage(sender, text, isSound);
        manageChatOverflow();
    };
    addMessage = window.addMessage;
    
    // Efek petunjuk kecil
    const hintSpan = document.querySelector('.hint-footer span');
    if (hintSpan) {
        hintSpan.style.transition = 'all 0.3s';
        setInterval(() => {
            hintSpan.style.opacity = '0.7';
            setTimeout(() => hintSpan.style.opacity = '1', 500);
        }, 3000);
    }
    
    // Keterangan: Tidak ada satupun teks yang menyebut "morse" atau "decode" atau "kode rahasia 93114" di UI.
    // Respon untuk kode benar hanya berupa indikator suara dan audio morse.
    // Petunjuk hanya: abjad, nuestro sitio web.
    // Label "teka-teki digital" dan aturan pesan sudah dihapus.
</script>
</body>
</html>
