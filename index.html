<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ICAN · Misteri Abjad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .puzzle-card {
            max-width: 800px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .hero {
            padding: 1.8rem 2rem 1.2rem 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .title {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-weight: 700;
        }

        .title .ican {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #E0E7FF, #A5B4FC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .title .ai-badge {
            font-size: 1rem;
            background: rgba(165, 180, 252, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #c7d2fe;
            font-weight: 500;
            border: 0.5px solid rgba(165, 180, 252, 0.4);
        }

        .sub {
            margin-top: 0.5rem;
            color: #94a3b8;
            font-size: 0.8rem;
            display: flex;
            justify-content: flex-end;
        }

        .chat-area {
            padding: 1.5rem 1.8rem;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease-out;
        }

        .user-msg {
            align-self: flex-end;
        }

        .ai-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 1.8rem;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
            transition: transform 0.1s ease;
        }

        .user-msg .bubble {
            background: linear-gradient(115deg, #4f46e5, #6366f1);
            color: white;
            border-bottom-right-radius: 0.25rem;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .ai-msg .bubble {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 0.25rem;
            backdrop-filter: blur(4px);
        }

        .morse-block {
            font-family: 'Courier New', 'SF Mono', monospace;
            font-weight: 600;
            background: #0f172a;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            margin-top: 0.5rem;
            border-left: 3px solid #facc15;
            white-space: pre;
            overflow-x: auto;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #facc15;
        }

        .timestamp {
            font-size: 0.65rem;
            margin-top: 0.3rem;
            margin-left: 0.8rem;
            color: #5b6e8c;
            letter-spacing: 0.3px;
        }

        .input-panel {
            padding: 1rem 1.8rem 1.8rem 1.8rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            background: #0f172a;
            border-radius: 3rem;
            padding: 0.25rem 0.25rem 0.25rem 1.2rem;
            border: 1px solid #334155;
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 0;
            font-size: 0.95rem;
            color: #f1f5f9;
            outline: none;
            font-family: inherit;
        }

        #messageInput::placeholder {
            color: #475569;
            font-weight: 400;
        }

        button {
            background: #4f46e5;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: #6366f1;
            transform: scale(0.96);
        }

        button:active {
            transform: scale(0.94);
        }

        .hint-footer {
            padding: 0.8rem 1.8rem 1.2rem;
            font-size: 0.75rem;
            color: #6c7a91;
            background: rgba(0, 0, 0, 0.2);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            letter-spacing: 0.3px;
        }

        .hint-footer span {
            color: #facc15;
            font-weight: 500;
            background: #00000030;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 550px) {
            .puzzle-card {
                border-radius: 1.8rem;
            }
            .chat-area {
                padding: 1.2rem;
                max-height: 420px;
            }
            .hero {
                padding: 1.2rem 1.2rem 0.8rem;
            }
            .title .ican {
                font-size: 1.8rem;
            }
            .message {
                max-width: 90%;
            }
            .input-panel {
                padding: 0.8rem 1.2rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="puzzle-card">
    <div class="hero">
        <div class="title">
            <span class="ican">ICAN</span>
            <span class="ai-badge">✦ 謎語AI ✦</span>
        </div>
        <div class="sub"></div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message ai-msg">
            <div class="bubble welcome-bubble">
                Halo, semoga beruntung🍀
            </div>
            <div class="timestamp">now</div>
        </div>
    </div>

    <div class="input-panel">
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Ketik pesan rahasia atau tebakan..." autocomplete="off">
            <button id="sendBtn">Kirim ➤</button>
        </div>
    </div>
    <div class="hint-footer">
        🔍 <span>petunjuk : abjad, nuestro sitio web</span>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chatArea');
    const inputField = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendBtn');

    // Morse untuk kode rahasia (93114) -> I LOVE YOU
    const morseAnswer = `..
.-..
---
...-
.
-.--
---
..-`;

    function addMessage(sender, text, isMorse = false, morseRaw = null) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        
        if (sender === 'ai' && isMorse && morseRaw) {
            // Hanya menampilkan teks pembuka dan blok morse, tanpa keterangan tambahan
            const normalText = document.createTextNode('🎯 Kode rahasia diterima. Inilah jawabannya:\n');
            bubbleDiv.appendChild(normalText);
            const preBlock = document.createElement('pre');
            preBlock.className = 'morse-block';
            preBlock.textContent = morseRaw;
            bubbleDiv.appendChild(preBlock);
            // Tidak ada teks "⌨️ morse · decode menjadi pesan rahasia"
        } 
        else {
            bubbleDiv.textContent = text;
        }
        
        messageDiv.appendChild(bubbleDiv);
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        timeSpan.textContent = timeStr;
        messageDiv.appendChild(timeSpan);
        
        chatContainer.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function processUserMessage(rawMessage) {
        let message = rawMessage.trim();
        if (message === "") {
            addMessage('ai', '📭 Kirim pesan teks ya ... (kosong tidak direspon)');
            return;
        }
        
        addMessage('user', message);
        
        if (message === "93114") {
            addMessage('ai', '', true, morseAnswer);
        } 
        else {
            addMessage('ai', 'web ini mungkin masi eror');
        }
    }
    
    function handleSend() {
        const userText = inputField.value;
        if (userText.trim() === "") {
            inputField.placeholder = "Ketik sesuatu dulu...";
            setTimeout(() => {
                inputField.placeholder = "Ketik pesan rahasia atau tebakan...";
            }, 1200);
            return;
        }
        processUserMessage(userText);
        inputField.value = "";
        inputField.focus();
    }
    
    function onEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    }
    
    window.addEventListener('load', () => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
        inputField.focus();
    });
    
    sendButton.addEventListener('click', handleSend);
    inputField.addEventListener('keypress', onEnterKey);
    
    const style = document.createElement('style');
    style.textContent = `
        .morse-block {
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (max-width: 480px) {
            .morse-block {
                font-size: 0.8rem;
            }
        }
    `;
    document.head.appendChild(style);
    
    document.title = "ICAN | Misteri Abjad";
    
    function manageChatOverflow() {
        const messages = chatContainer.querySelectorAll('.message');
        if (messages.length > 45) {
            for (let i = 0; i < 15; i++) {
                if (messages[i]) messages[i].remove();
            }
        }
    }
    
    const originalAddMessage = addMessage;
    window.addMessage = function(sender, text, isMorse, morseRaw) {
        originalAddMessage(sender, text, isMorse, morseRaw);
        manageChatOverflow();
    };
    addMessage = window.addMessage;
    
    // Copy morse saat klik
    document.addEventListener('click', (e) => {
        const morseBlock = e.target.closest('.morse-block');
        if (morseBlock) {
            const morseText = morseBlock.innerText;
            navigator.clipboard.writeText(morseText).then(() => {
                const originalBg = morseBlock.style.backgroundColor;
                morseBlock.style.backgroundColor = '#2d3a5e';
                morseBlock.style.transition = '0.1s';
                setTimeout(() => {
                    morseBlock.style.backgroundColor = '';
                }, 200);
                const toast = document.createElement('div');
                toast.textContent = '📋 Morse disalin!';
                toast.style.position = 'fixed';
                toast.style.bottom = '20px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = '#0f172a';
                toast.style.color = '#facc15';
                toast.style.padding = '6px 14px';
                toast.style.borderRadius = '40px';
                toast.style.fontSize = '0.75rem';
                toast.style.zIndex = '999';
                toast.style.fontFamily = 'monospace';
                toast.style.border = '1px solid #facc1533';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            }).catch(() => {});
        }
    });
    
    const hintSpan = document.querySelector('.hint-footer span');
    if (hintSpan) {
        hintSpan.style.transition = 'all 0.3s';
        setInterval(() => {
            hintSpan.style.opacity = '0.7';
            setTimeout(() => hintSpan.style.opacity = '1', 500);
        }, 3000);
    }
</script>
</body>
</html>
